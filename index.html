// ─── Storage via localStorage ────────────────────────────────────────────────
async function load(key) {
  try { const v = localStorage.getItem("cfo_" + key); return v ? JSON.parse(v) : []; } catch { return []; }
}
async function loadOne(key) {
  try { const v = localStorage.getItem("cfo_one_" + key); return v ? JSON.parse(v) : null; } catch { return null; }
}
async function save(key, data) {
  try { localStorage.setItem("cfo_" + key, JSON.stringify(data)); } catch {}
}
async function saveOne(key, data) {
  try { localStorage.setItem("cfo_one_" + key, JSON.stringify(data)); } catch {}
}

// ─── Price fetch ──────────────────────────────────────────────────────────────
async function fetchPrices(tickers) {
  const prompt=`Search current market prices in USD for: ${tickers.join(", ")}. CEDEARs: use underlying US price. Argentine stocks: convert ARS to USD at blue rate. Return ONLY raw JSON: {"AAPL":185.50} Use null if not found.`;
  const messages=[{role:"user",content:prompt}];
  let r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,tools:[{type:"web_search_20250305",name:"web_search"}],messages})});
  let d=await r.json();
  if(d.stop_reason==="tool_use"){
    const aMsg={role:"assistant",content:d.content};
    const tRes=d.content.filter(b=>b.type==="tool_use").map(b=>({type:"tool_result",tool_use_id:b.id,content:""}));
    r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[...messages,aMsg,{role:"user",content:tRes}]})});
    d=await r.json();
  }
  if(d.error) throw new Error(d.error.message);
  const text=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const s=text.indexOf("{"),e=text.lastIndexOf("}");
  if(s===-1) throw new Error("No JSON");
  return JSON.parse(text.slice(s,e+1));
}

// ─── Pie Chart ────────────────────────────────────────────────────────────────
function PieChart({data,size=150}){
  const total=data.reduce((a,b)=>a+b.value,0);
  if(!total) return null;
  let angle=-Math.PI/2;
  const cx=size/2,cy=size/2,r=size/2-10,ri=r*0.52;
  const slices=data.map(d=>{
    const sweep=(d.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    const xi1=cx+ri*Math.cos(angle-sweep),yi1=cy+ri*Math.sin(angle-sweep);
    const xi2=cx+ri*Math.cos(angle),yi2=cy+ri*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    return {...d,path:`M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${large},0 ${xi1},${yi1} Z`,pct:Math.round((d.value/total)*100)};
  });
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="#000" strokeWidth="1.5"/>)}</svg>;
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function Home({expenses,bills,investments,onNav,filterMonth,filterYear,setFilterMonth,setFilterYear}){
  const filtExp=expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===filterMonth&&d.getFullYear()===filterYear;});
  const totalExp=filtExp.reduce((a,b)=>a+b.amount,0);
  const monthBills=bills.filter(b=>(b.month??now.getMonth())===filterMonth&&(b.year??now.getFullYear())===filterYear);
  const totalBills=monthBills.reduce((a,b)=>a+b.amount,0);
  const invUSD=investments.reduce((a,b)=>a+(b.qty*b.price),0);
  const invRend=investments.reduce((a,b)=>a+(b.rendUSD||0),0);
  const catData=CATS.map(c=>({name:c,value:filtExp.filter(e=>e.category===c).reduce((a,b)=>a+b.amount,0),color:CAT_COLORS[c]})).filter(c=>c.value>0).sort((a,b)=>b.value-a.value);
  const total=catData.reduce((a,b)=>a+b.value,0);
  const recentExp=filtExp.slice().reverse().slice(0,4);
  const upcoming=[0,1,2].map(i=>{let m=(filterMonth+i)%12,y=filterYear+Math.floor((filterMonth+i)/12);const items=bills.filter(b=>(b.month??now.getMonth())===m&&(b.year??now.getFullYear())===y);return{m,y,total:items.reduce((a,b)=>a+b.amount,0),count:items.length};}).filter(x=>x.total>0);

  // ── Insights ──
  const prevM=(filterMonth-1+12)%12, prevY=filterMonth===0?filterYear-1:filterYear;
  const prevExp=expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===prevM&&d.getFullYear()===prevY;});
  const totalPrev=prevExp.reduce((a,b)=>a+b.amount,0);
  const expDiff=totalPrev>0?((totalExp-totalPrev)/totalPrev)*100:null;
  const bestInv=investments.length?[...investments].sort((a,b)=>(b.rendUSD||0)-(a.rendUSD||0))[0]:null;
  const invRendPct=invUSD>0?((invRend/(invUSD-invRend))*100):0;
  const nextM=(filterMonth+1)%12, nextY=filterMonth===11?filterYear+1:filterYear;
  const nextBills=bills.filter(b=>(b.month??now.getMonth())===nextM&&(b.year??now.getFullYear())===nextY);
  const nextBillsTotal=nextBills.reduce((a,b)=>a+b.amount,0);
  const billsDiff=totalBills>0?((nextBillsTotal-totalBills)/totalBills)*100:null;
  const topCat=catData[0]||null;

  const Pill=({color,children})=><span style={{background:`${color}18`,color,fontSize:"0.65rem",fontWeight:700,padding:"2px 7px",borderRadius:20,fontFamily:"'JetBrains Mono',monospace"}}>{children}</span>;

  return <div style={{padding:"0 1rem 90px",animation:"fadeIn .3s ease"}}>
    <div style={{padding:"1.5rem 0 0.85rem",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{fontSize:"0.6rem",color:"#333",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.14em"}}>CFO</div>
        <div style={{fontSize:"1.5rem",fontWeight:800,color:"#fff",lineHeight:1.1}}>Controla Finanzas</div>
      </div>
      <div style={{display:"flex",gap:6}}>
        <select style={{...inpS,width:68,padding:"0.35rem 0.5rem",fontSize:"0.72rem"}} value={filterMonth} onChange={e=>setFilterMonth(+e.target.value)}>{MONTHS_S.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
        <select style={{...inpS,width:66,padding:"0.35rem 0.5rem",fontSize:"0.72rem"}} value={filterYear} onChange={e=>setFilterYear(+e.target.value)}>{[now.getFullYear(),now.getFullYear()-1].map(y=><option key={y}>{y}</option>)}</select>
      </div>
    </div>

    {/* ── Highlights ── */}
    <div style={{display:"flex",flexDirection:"column",gap:"0.45rem",marginBottom:"1rem"}}>
      {expDiff!==null&&<div style={{background:"#0a0a0a",border:`1px solid ${expDiff>0?"#ef444422":"#22c55e22"}`,borderLeft:`3px solid ${expDiff>0?"#ef4444":"#22c55e"}`,borderRadius:12,padding:"0.7rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:"0.58rem",color:"#444",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>Gastos vs {MONTHS_S[prevM]}</div>
          <div style={{fontSize:"0.82rem",color:"#ccc",marginTop:2}}>{expDiff>0?"Gastás más este mes":"Gastás menos este mes"}</div>
        </div>
        <Pill color={expDiff>0?"#ef4444":"#22c55e"}>{expDiff>0?"▲":"▼"} {Math.abs(expDiff).toFixed(1)}%</Pill>
      </div>}

      {bestInv&&bestInv.rendUSD>0&&<div style={{background:"#0a0a0a",border:"1px solid #22c55e22",borderLeft:"3px solid #22c55e",borderRadius:12,padding:"0.7rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:"0.58rem",color:"#444",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>Mejor inversión</div>
          <div style={{fontSize:"0.82rem",color:"#ccc",marginTop:2}}>{bestInv.ticker} · {bestInv.name}</div>
        </div>
        <Pill color="#22c55e">+{fmtUSD(bestInv.rendUSD)}</Pill>
      </div>}

      {invRend!==0&&<div style={{background:"#0a0a0a",border:`1px solid ${invRend>=0?"#22c55e22":"#ef444422"}`,borderLeft:`3px solid ${invRend>=0?"#22c55e":"#ef4444"}`,borderRadius:12,padding:"0.7rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:"0.58rem",color:"#444",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>Rendimiento portfolio</div>
          <div style={{fontSize:"0.82rem",color:"#ccc",marginTop:2}}>{fmtUSD2(invUSD)} en total</div>
        </div>
        <Pill color={invRend>=0?"#22c55e":"#ef4444"}>{invRend>=0?"+":""}{invRendPct.toFixed(1)}%</Pill>
      </div>}

      {topCat&&<div style={{background:"#0a0a0a",border:"1px solid #1c1c1c",borderLeft:`3px solid ${topCat.color}`,borderRadius:12,padding:"0.7rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:"0.58rem",color:"#444",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>Mayor gasto · {MONTHS_S[filterMonth]}</div>
          <div style={{fontSize:"0.82rem",color:"#ccc",marginTop:2}}>{topCat.name}</div>
        </div>
        <Pill color={topCat.color}>{Math.round((topCat.value/total)*100)}% del total</Pill>
      </div>}

      {billsDiff!==null&&Math.abs(billsDiff)>5&&<div style={{background:"#0a0a0a",border:`1px solid ${billsDiff>0?"#f59e0b22":"#22c55e22"}`,borderLeft:`3px solid ${billsDiff>0?"#f59e0b":"#22c55e"}`,borderRadius:12,padding:"0.7rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:"0.58rem",color:"#444",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>Cuotas próximo mes</div>
          <div style={{fontSize:"0.82rem",color:"#ccc",marginTop:2}}>{billsDiff>0?"Suben en":"Bajan en"} {MONTHS_S[nextM]}</div>
        </div>
        <Pill color={billsDiff>0?"#f59e0b":"#22c55e"}>{billsDiff>0?"▲":"▼"} {Math.abs(billsDiff).toFixed(0)}%</Pill>
      </div>}
    </div>

    {catData.length>0 ? (
      <div style={{background:"#0a0a0a",border:"1px solid #1c1c1c",borderRadius:16,padding:"1rem",marginBottom:"0.75rem"}}>
        <div style={{fontSize:"0.62rem",color:"#333",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"0.85rem"}}>Gastos por categoría · {MONTHS_S[filterMonth]} {filterYear}</div>
        <div style={{display:"flex",gap:"1rem",alignItems:"center"}}>
          <div style={{flexShrink:0}}><PieChart data={catData} size={150}/></div>
          <div style={{flex:1,minWidth:0}}>
            {catData.map(c=><div key={c.name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"0.45rem"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:8,borderRadius:2,background:c.color,flexShrink:0}}/><span style={{fontSize:"0.72rem",color:"#888"}}>{c.name}</span></div>
              <span style={{fontSize:"0.68rem",color:c.color,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{Math.round((c.value/total)*100)}%</span>
            </div>)}
            <div style={{borderTop:"1px solid #1a1a1a",marginTop:"0.5rem",paddingTop:"0.5rem",display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:"0.72rem",color:"#444",fontWeight:700}}>Total</span>
              <span style={{fontSize:"0.75rem",color:"#ef4444",fontFamily:"'JetBrains Mono',monospace",fontWeight:800}}>{fmtARS(total)}</span>
            </div>
          </div>
        </div>
      </div>
    ) : <div style={{background:"#0a0a0a",border:"1px solid #1c1c1c",borderRadius:16,padding:"2rem",marginBottom:"0.75rem",textAlign:"center",cursor:"pointer"}} onClick={()=>onNav("expenses")}><div style={{fontSize:"0.82rem",color:"#222"}}>Sin gastos en {MONTHS_S[filterMonth]} · Agregá uno</div></div>}

    <div onClick={()=>onNav("expenses")} style={{background:"#0a0a0a",border:"1px solid #1c1c1c",borderLeft:"3px solid #ef4444",borderRadius:14,padding:"1rem 1.25rem",marginBottom:"0.6rem",cursor:"pointer",position:"relative"}}>
      <div style={{fontSize:"0.6rem",color:"#ef4444",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Gastos · {MONTHS_S[filterMonth]}</div>
      <div style={{fontSize:"1.7rem",fontWeight:800,color:"#ef4444",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"-0.04em",lineHeight:1}}>{fmtARS(totalExp)}</div>
      <div style={{fontSize:"0.65rem",color:"#333",marginTop:2}}>{filtExp.length} transacciones</div>
      <div style={{position:"absolute",right:14,bottom:12,color:"#222"}}><Ic n="arrow" s={16}/></div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem",marginBottom:"1rem"}}>
      <div onClick={()=>onNav("bills")} style={{background:"#0a0a0a",border:"1px solid #1c1c1c",borderLeft:"3px solid #f59e0b",borderRadius:14,padding:"1rem",cursor:"pointer",position:"relative"}}>
        <div style={{fontSize:"0.6rem",color:"#f59e0b",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Cuotas · {MONTHS_S[filterMonth]}</div>
        <div style={{fontSize:"1.2rem",fontWeight:800,color:"#f59e0b",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"-0.03em",lineHeight:1}}>{fmtARS(totalBills)}</div>
        <div style={{fontSize:"0.62rem",color:"#333",marginTop:3}}>{monthBills.length} cuotas</div>
        <div style={{position:"absolute",right:10,bottom:10,color:"#222"}}><Ic n="arrow" s={14}/></div>
      </div>
      <div onClick={()=>onNav("investments")} style={{background:"#0a0a0a",border:"1px solid #1c1c1c",borderLeft:"3px solid #22c55e",borderRadius:14,padding:"1rem",cursor:"pointer",position:"relative"}}>
        <div style={{fontSize:"0.6rem",color:"#22c55e",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Inversiones</div>
        <div style={{fontSize:"1.2rem",fontWeight:800,color:"#22c55e",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"-0.03em",lineHeight:1}}>{fmtUSD(invUSD)}</div>
        {invRend>0&&<div style={{fontSize:"0.62rem",color:"#22c55e88",marginTop:3}}>+{fmtUSD(invRend)} rend.</div>}
        <div style={{position:"absolute",right:10,bottom:10,color:"#222"}}><Ic n="arrow" s={14}/></div>
      </div>
    </div>

    {upcoming.length>0&&<div style={{marginBottom:"1.25rem"}}>
      <div style={{fontSize:"0.62rem",color:"#333",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"0.55rem"}}>Proyección cuotas</div>
      <div style={{display:"flex",gap:"0.5rem"}}>
        {upcoming.map(({m,y,total,count})=><div key={`${y}-${m}`} style={{flex:1,background:"#0a0a0a",border:"1px solid #f59e0b22",borderRadius:10,padding:"0.65rem 0.75rem",textAlign:"center"}}>
          <div style={{fontSize:"0.6rem",color:"#f59e0b",fontWeight:700,textTransform:"uppercase",marginBottom:3}}>{MONTHS_S[m]}</div>
          <div style={{fontSize:"0.85rem",fontWeight:800,color:"#f59e0b",fontFamily:"'JetBrains Mono',monospace"}}>{fmtShort(total)}</div>
          <div style={{fontSize:"0.58rem",color:"#333",marginTop:2}}>{count} cuotas</div>
        </div>)}
      </div>
    </div>}

    {recentExp.length>0&&<div>
      <div style={{fontSize:"0.62rem",color:"#333",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"0.55rem"}}>Últimos gastos</div>
      {recentExp.map(e=><div key={e.id} style={{display:"flex",alignItems:"center",gap:"0.7rem",padding:"0.6rem 0.85rem",background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:10,marginBottom:"0.35rem"}}>
        <div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLORS[e.category],flexShrink:0}}/>

        </div>
        <div style={{fontSize:"0.8rem",fontWeight:700,color:"#ef4444",fontFamily:"'JetBrains Mono',monospace"}}>{fmtARS(e.amount)}</div>
      </div>)}
    </div>}
  </div>;
}

// ─── EXPENSES ─────────────────────────────────────────────────────────────────
function ExpensesScreen({expenses,setExpenses,filterMonth,filterYear,setFilterMonth,setFilterYear}){
  const [modal,setModal]=useState(null);

        <Field label="Tarjeta"><select style={inpS} value={eF.card} onChange={e=>setEF(f=>({...f,card:e.target.value}))}>{CARDS.map(c=><option key={c}>{c}</option>)}</select></Field>
      </div>
      <div style={{display:"flex",gap:"0.5rem",justifyContent:"flex-end",marginTop:"0.25rem"}}>
        <Btn ghost onClick={()=>setModal(null)}>Cancelar</Btn>
        <Btn onClick={addExp} color="#ef4444" style={{color:"#fff"}}><Ic n="plus" s={13}/>Guardar</Btn>
      </div>
    </Modal>}
  </div>;
}

// ─── BILLS ────────────────────────────────────────────────────────────────────
function BillsScreen({bills,setBills}){
  const [modal,setModal]=useState(null);
  const [bF,setBF]=useState({description:"",category:"Servicios",amount:"",dueDay:"",card:"Visa Santander"});
  const addBill=async()=>{if(!bF.description||!bF.amount)return;const u=[...bills,{...bF,id:Date.now(),amount:+bF.amount,dueDay:+bF.dueDay||0,month:now.getMonth(),year:now.getFullYear(),isInstallment:false}];setBills(u);await save("bills",u);setModal(null);setBF({description:"",category:"Servicios",amount:"",dueDay:"",card:"Visa Santander"});};
  const del=async id=>{const u=bills.filter(x=>x.id!==id);setBills(u);await save("bills",u);};
  const grouped={};
  [...bills].sort((a,b)=>{const ay=a.year||now.getFullYear(),am=a.month??now.getMonth(),by=b.year||now.getFullYear(),bm=b.month??now.getMonth();return ay!==by?ay-by:am-bm;}).forEach(b=>{const m=b.month??now.getMonth(),y=b.year??now.getFullYear(),k=`${y}-${m}`;if(!grouped[k])grouped[k]={m,y,items:[]};grouped[k].items.push(b);});

  return <div style={{padding:"0 1rem 90px",animation:"fadeIn .25s ease"}}>
    <div style={{padding:"1.25rem 0 0.75rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{fontSize:"0.6rem",color:"#f59e0b",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em"}}>Módulo</div><div style={{fontSize:"1.3rem",fontWeight:800,color:"#fff"}}>Cuotas y Compromisos</div></div>
      <Btn onClick={()=>setModal("add")} color="#f59e0b" style={{color:"#000",padding:"0.5rem 0.8rem"}}><Ic n="plus" s={14}/></Btn>
    </div>
    {bills.length===0?<div style={{textAlign:"center",color:"#222",padding:"3rem",fontSize:"0.85rem"}}>Sin compromisos registrados.</div>
    :Object.keys(grouped).map(key=>{
      const {m,y,items}=grouped[key];
      const isCurrent=m===now.getMonth()&&y===now.getFullYear();
      const groupTotal=items.reduce((a,b)=>a+b.amount,0);
      return <div key={key} style={{marginBottom:"1.25rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem",padding:"0 0.1rem"}}>
          <div style={{fontSize:"0.65rem",color:isCurrent?"#f59e0b":"#333",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",display:"flex",alignItems:"center",gap:6}}>
            {isCurrent&&<span style={{width:5,height:5,borderRadius:"50%",background:"#f59e0b",display:"inline-block"}}/>}
            {MONTHS_S[m]} {y}
          </div>
          <span style={{fontSize:"0.68rem",color:"#333",fontFamily:"'JetBrains Mono',monospace"}}>{fmtARS(groupTotal)}</span>
        </div>
        {[...items].sort((a,b)=>(a.dueDay||99)-(b.dueDay||99)).map((b,i)=><div key={b.id} style={{display:"flex",alignItems:"center",gap:"0.7rem",padding:"0.65rem 0.85rem",background:"#0a0a0a",border:`1px solid ${b.isInstallment?"#f59e0b22":"#1a1a1a"}`,borderRadius:10,marginBottom:"0.35rem"}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:"#f59e0b",flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:"0.8rem",fontWeight:600,color:"#ddd",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.description}</div>
            <div style={{fontSize:"0.6rem",color:"#444",marginTop:1,display:"flex",gap:6}}>
              {b.dueDay>0&&<span>Día {b.dueDay}</span>}
              <span>{b.category}</span>
              {b.card&&<span style={{background:`${CARD_COLOR[b.card]||"#3b82f6"}18`,color:CARD_COLOR[b.card]||"#3b82f6",fontSize:"0.58rem",fontWeight:700,padding:"1px 5px",borderRadius:4}}>{b.card}</span>}
            </div>
          </div>
          <div style={{fontSize:"0.82rem",fontWeight:700,color:"#f59e0b",fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap"}}>{fmtARS(b.amount)}</div>
          <button onClick={()=>del(b.id)} style={{background:"none",border:"none",color:"#252525",cursor:"pointer",padding:4,display:"flex",borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.color="#ef4444"} onMouseLeave={e=>e.currentTarget.style.color="#252525"}><Ic n="trash" s={13}/></button>
        </div>)}
      </div>;
    })}
    {modal==="add"&&<Modal title="Nuevo compromiso" onClose={()=>setModal(null)}>
      <Field label="Descripción"><input style={inpS} placeholder="Ej: Expensas, Cuota..." value={bF.description} onChange={e=>setBF(f=>({...f,description:e.target.value}))}/></Field>
      <Field label="Categoría"><select style={inpS} value={bF.category} onChange={e=>setBF(f=>({...f,category:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.5rem"}}>
        <Field label="Monto (ARS)"><input type="number" style={inpS} placeholder="0" value={bF.amount} onChange={e=>setBF(f=>({...f,amount:e.target.value}))}/></Field>
        <Field label="Día vencimiento"><input type="number" style={inpS} placeholder="Ej: 1" min="1" max="31" value={bF.dueDay} onChange={e=>setBF(f=>({...f,dueDay:e.target.value}))}/></Field>
      </div>
      <Field label="Tarjeta"><select style={inpS} value={bF.card} onChange={e=>setBF(f=>({...f,card:e.target.value}))}>{CARDS.map(c=><option key={c}>{c}</option>)}</select></Field>
      <div style={{display:"flex",gap:"0.5rem",justifyContent:"flex-end",marginTop:"0.25rem"}}>
        <Btn ghost onClick={()=>setModal(null)}>Cancelar</Btn>
        <Btn onClick={addBill} color="#f59e0b" style={{color:"#000"}}><Ic n="plus" s={13}/>Guardar</Btn>
      </div>
    </Modal>}
  </div>;
}

// ─── INVESTMENTS ──────────────────────────────────────────────────────────────
function InvestmentsScreen({investments,setInvestments}){
  const [modal,setModal]=useState(null);
  const [filter,setFilter]=useState("Todos");
  const [updating,setUpdating]=useState(false);
  const [updateMsg,setUpdateMsg]=useState("");
  const [lastUpdate,setLastUpdate]=useState(null);
  const [iF,setIF]=useState({ticker:"",name:"",type:"CEDEAR",qty:"",price:"",rendUSD:"",currency:"USD"});
  const tabs=["Todos","CEDEAR","Acción","ON","Fondo"];
  const filtered=filter==="Todos"?investments:investments.filter(i=>i.type===filter);
  const total=investments.reduce((a,b)=>a+(b.qty*b.price),0);
  const totalRend=investments.reduce((a,b)=>a+(b.rendUSD||0),0);
  const costBasis=total-totalRend;
  const rendPct=costBasis>0?(totalRend/costBasis)*100:0;
  const byType=["CEDEAR","Acción","ON","Fondo"].map(t=>({t,val:investments.filter(i=>i.type===t).reduce((a,b)=>a+(b.qty*b.price),0),rend:investments.filter(i=>i.type===t).reduce((a,b)=>a+(b.rendUSD||0),0)})).filter(x=>x.val>0);
  const addInv=async()=>{if(!iF.ticker||!iF.qty||!iF.price)return;const u=[...investments,{...iF,id:Date.now(),qty:+iF.qty,price:+iF.price,rendUSD:+iF.rendUSD||0}];setInvestments(u);await save("investments",u);setModal(null);setIF({ticker:"",name:"",type:"CEDEAR",qty:"",price:"",rendUSD:"",currency:"USD"});};
  const delInv=async id=>{const u=investments.filter(x=>x.id!==id);setInvestments(u);await save("investments",u);};
  const updatePrices=async()=>{
    setUpdating(true);setUpdateMsg("Buscando precios...");
    try{
      const prices=await fetchPrices(investments.map(i=>i.ticker));
      let cnt=0;
      const newInv=investments.map(inv=>{const p=prices[inv.ticker];if(p&&p>0){cnt++;return{...inv,price:+p.toFixed(6),prevPrice:inv.price};}return inv;});
      setInvestments(newInv);await save("investments",newInv);
      const ts=new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
      setLastUpdate(ts);setUpdateMsg(`✓ ${cnt} precios actualizados · ${ts}`);
      setTimeout(()=>setUpdateMsg(""),4000);
    }catch(e){setUpdateMsg("Error: "+e.message);setTimeout(()=>setUpdateMsg(""),3000);}
    setUpdating(false);
  };

  return <div style={{padding:"0 1rem 90px",animation:"fadeIn .25s ease"}}>
    <div style={{padding:"1.25rem 0 0.75rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{fontSize:"0.6rem",color:"#22c55e",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em"}}>Módulo</div><div style={{fontSize:"1.3rem",fontWeight:800,color:"#fff"}}>Inversiones</div></div>
      <div style={{display:"flex",gap:6}}>
        <Btn onClick={updatePrices} disabled={updating} color="#22c55e" sm style={{color:"#000"}}>
          <span style={{display:"inline-flex",animation:updating?"spin 1s linear infinite":"none"}}><Ic n="refresh" s={13}/></span>{updating?"...":"Actualizar"}
        </Btn>
        <Btn ghost onClick={()=>setModal("add")} sm><Ic n="plus" s={13}/></Btn>
      </div>
    </div>
    {updateMsg&&<div style={{background:updateMsg.startsWith("✓")?"#22c55e18":"#f59e0b18",border:`1px solid ${updateMsg.startsWith("✓")?"#22c55e33":"#f59e0b33"}`,borderRadius:10,padding:"0.6rem 0.9rem",marginBottom:"0.9rem",fontSize:"0.75rem",color:updateMsg.startsWith("✓")?"#22c55e":"#f59e0b"}}>{updateMsg}</div>}
    <div style={{background:"#0d0d0d",border:"1px solid #22c55e22",borderLeft:"3px solid #22c55e",borderRadius:14,padding:"1rem 1.25rem",marginBottom:"1rem"}}>
      <div style={{fontSize:"0.62rem",color:"#22c55e",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>Portfolio Total</div>
      <div style={{fontSize:"2rem",fontWeight:800,color:"#22c55e",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"-0.04em"}}>{fmtUSD2(total)}</div>
      {totalRend!==0&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
        <span style={{fontSize:"0.78rem",fontWeight:700,color:totalRend>=0?"#22c55e":"#ef4444",fontFamily:"'JetBrains Mono',monospace"}}>{totalRend>=0?"+":""}{fmtUSD2(totalRend)}</span>
        <span style={{fontSize:"0.68rem",color:totalRend>=0?"#22c55e55":"#ef444455",fontFamily:"'JetBrains Mono',monospace"}}>({totalRend>=0?"+":""}{rendPct.toFixed(1)}%)</span>
        <span style={{fontSize:"0.62rem",color:"#333"}}>rendimiento</span>
      </div>}
      {lastUpdate&&<div style={{fontSize:"0.6rem",color:"#333",marginTop:4}}>Actualizado {lastUpdate}</div>}
      <div style={{display:"flex",gap:"0.6rem",flexWrap:"wrap",marginTop:"0.85rem"}}>
        {byType.map(({t,val,rend})=><div key={t} style={{background:`${TYPE_COLOR[t]}15`,border:`1px solid ${TYPE_COLOR[t]}30`,borderRadius:9,padding:"0.35rem 0.7rem"}}>
          <div style={{fontSize:"0.58rem",color:TYPE_COLOR[t],fontWeight:700,textTransform:"uppercase"}}>{t}</div>
          <div style={{fontSize:"0.8rem",color:"#ccc",fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{fmtUSD(val)}</div>
          {rend!==0&&<div style={{fontSize:"0.62rem",color:rend>=0?"#22c55e":"#ef4444",fontFamily:"'JetBrains Mono',monospace"}}>{rend>=0?"+":""}{fmtUSD(rend)}</div>}
        </div>)}
      </div>
    </div>
    <div style={{display:"flex",gap:5,marginBottom:"1rem",overflowX:"auto",paddingBottom:3}}>
      {tabs.map(t=><button key={t} onClick={()=>setFilter(t)} style={{padding:"0.32rem 0.8rem",borderRadius:20,border:`1px solid ${filter===t?(TYPE_COLOR[t]||"#22c55e"):"#1a1a1a"}`,background:filter===t?`${TYPE_COLOR[t]||"#22c55e"}18`:"transparent",color:filter===t?(TYPE_COLOR[t]||"#22c55e"):"#333",cursor:"pointer",fontSize:"0.73rem",fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap"}}>{t}</button>)}
    </div>
    {filtered.length===0?<div style={{textAlign:"center",color:"#222",padding:"3rem",fontSize:"0.85rem"}}>Sin posiciones</div>
    :filtered.map((inv,i)=>{
      const color=TYPE_COLOR[inv.type]||"#22c55e";
      const valorTotal=inv.qty*inv.price;
      const rend=inv.rendUSD||0;
      const priceUp=inv.prevPrice&&inv.price>inv.prevPrice;
      const priceChanged=inv.prevPrice&&Math.abs(inv.prevPrice-inv.price)>0.0001;
      return <div key={inv.id} style={{background:"#0a0a0a",border:`1px solid ${color}15`,borderRadius:10,padding:"0.75rem 0.9rem",marginBottom:"0.4rem",animation:`fadeIn .25s ${i*.04}s both`}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
          <div style={{background:`${color}15`,border:`1px solid ${color}30`,borderRadius:8,padding:"0.3rem 0.55rem",minWidth:60,textAlign:"center",flexShrink:0}}>
            <div style={{fontSize:"0.7rem",fontWeight:800,color,fontFamily:"'JetBrains Mono',monospace"}}>{inv.ticker}</div>
            <div style={{fontSize:"0.55rem",color:"#333",marginTop:1,fontWeight:600}}>{inv.type}</div>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:"0.8rem",fontWeight:600,color:"#ccc",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{inv.name||inv.ticker}</div>
            <div style={{fontSize:"0.63rem",color:"#333",marginTop:1,display:"flex",alignItems:"center",gap:5}}>
              <span>{inv.qty} u.</span>
              <span style={{color:priceChanged?(priceUp?"#22c55e":"#ef4444"):"#333",fontFamily:"'JetBrains Mono',monospace"}}>{fmtUSD2(inv.price)}{priceChanged&&(priceUp?" ▲":" ▼")}</span>
            </div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:"0.88rem",fontWeight:700,color:"#22c55e",fontFamily:"'JetBrains Mono',monospace"}}>{fmtUSD(valorTotal)}</div>
            {rend!==0&&<div style={{fontSize:"0.65rem",fontWeight:700,color:rend>0?"#22c55e":"#ef4444",fontFamily:"'JetBrains Mono',monospace"}}>{rend>0?"+":""}{fmtUSD(rend)}</div>}
          </div>
          <button onClick={()=>delInv(inv.id)} style={{background:"none",border:"none",color:"#252525",cursor:"pointer",padding:4,display:"flex",borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.color="#ef4444"} onMouseLeave={e=>e.currentTarget.style.color="#252525"}><Ic n="trash" s={13}/></button>
        </div>
      </div>;
    })}
    {modal==="add"&&<Modal title="Nueva inversión" onClose={()=>setModal(null)}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.5rem"}}>
        <Field label="Ticker"><input style={inpS} placeholder="Ej: NVDA" value={iF.ticker} onChange={e=>setIF(f=>({...f,ticker:e.target.value.toUpperCase()}))}/></Field>
        <Field label="Tipo"><select style={inpS} value={iF.type} onChange={e=>setIF(f=>({...f,type:e.target.value}))}>{INV_TYPES.map(t=><option key={t}>{t}</option>)}</select></Field>
      </div>
      <Field label="Nombre"><input style={inpS} placeholder="Ej: Nvidia" value={iF.name} onChange={e=>setIF(f=>({...f,name:e.target.value}))}/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 75px",gap:"0.5rem"}}>
        <Field label="Cantidad"><input type="number" style={inpS} placeholder="0" value={iF.qty} onChange={e=>setIF(f=>({...f,qty:e.target.value}))}/></Field>
        <Field label="Precio USD"><input type="number" style={inpS} placeholder="0" value={iF.price} onChange={e=>setIF(f=>({...f,price:e.target.value}))}/></Field>
        <Field label="Moneda"><select style={inpS} value={iF.currency} onChange={e=>setIF(f=>({...f,currency:e.target.value}))}><option>USD</option><option>ARS</option></select></Field>
      </div>
      <Field label="Rendimiento USD"><input type="number" style={inpS} placeholder="0" value={iF.rendUSD} onChange={e=>setIF(f=>({...f,rendUSD:e.target.value}))}/></Field>
      <div style={{display:"flex",gap:"0.5rem",justifyContent:"flex-end",marginTop:"0.25rem"}}>
        <Btn ghost onClick={()=>setModal(null)}>Cancelar</Btn>
        <Btn onClick={addInv} color="#22c55e" style={{color:"#000"}}><Ic n="plus" s={13}/>Guardar</Btn>
      </div>
    </Modal>}
  </div>;
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("home");
  const [expenses,setExpenses]=useState([]);
  const [bills,setBills]=useState([]);
  const [investments,setInvestments]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterMonth,setFilterMonth]=useState(now.getMonth());
  const [filterYear,setFilterYear]=useState(now.getFullYear());

  const DATA_VERSION=2;
  const init=async()=>{
    const [e,b,inv,seeded,billsSeeded,expSeeded,dataVer]=await Promise.all([load("expenses"),load("bills"),load("investments"),loadOne("seeded"),loadOne("billsSeeded"),loadOne("expSeeded"),loadOne("dataVersion")]);
    const ver=dataVer||0;

    // Gastos
    if(!expSeeded&&(!e||e.length===0)){setExpenses(SEED_EXPENSES);await save("expenses",SEED_EXPENSES);await saveOne("expSeeded",true);}
    else if(ver<2){
      // Migración v2: agregar gastos nuevos que no existan aún
      const existing=e||[];
      const existingIds=new Set(existing.map(x=>x.id));
      const toAdd=SEED_EXPENSES.filter(x=>!existingIds.has(x.id)&&new Date(x.date)>=new Date("2026-05-22"));
      const merged=[...existing,...toAdd];
      setExpenses(merged);await save("expenses",merged);
    } else {setExpenses(e||[]);}

    // Cuotas
    if(!billsSeeded&&(!b||b.length===0)){const sb=buildSeedBills();setBills(sb);await save("bills",sb);await saveOne("billsSeeded",true);}
    else if(ver<2){
      // Migración v2: agregar cuotas de Mercado Pago si no existen
      const existing=b||[];
      const hasMp=existing.some(x=>x.card==="Mercado Pago");
      if(!hasMp){
        const allBills=buildSeedBills();
        const mpBills=allBills.filter(x=>x.card==="Mercado Pago");
        const merged=[...existing,...mpBills];
        setBills(merged);await save("bills",merged);
      } else {setBills(existing);}
    } else {setBills(b||[]);}

    // Inversiones
    if(!seeded&&(!inv||inv.length===0)){setInvestments(SEED_INV);await save("investments",SEED_INV);await saveOne("seeded",true);}else{setInvestments(inv||[]);}

    if(ver<DATA_VERSION) await saveOne("dataVersion",DATA_VERSION);
    setLoading(false);
  };

  useEffect(()=>{ init(); },[]);

  if(loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#000",fontFamily:"'JetBrains Mono',monospace"}}>
    <div style={{textAlign:"center"}}>
      <div style={{width:32,height:32,border:"2px solid #111",borderTopColor:"#22c55e",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 1rem"}}/>
      <div style={{color:"#222",fontSize:"0.72rem"}}>Cargando CFO...</div>
    </div>
  </div>;

  const navColors={home:"#fff",expenses:"#ef4444",bills:"#f59e0b",investments:"#22c55e"};
  return <div style={{minHeight:"100vh",background:"#000",fontFamily:"'Outfit',system-ui,sans-serif",color:"#eee",maxWidth:520,margin:"0 auto"}}>
    <div style={{paddingBottom:70}}>
      {screen==="home"&&<Home expenses={expenses} bills={bills} investments={investments} onNav={setScreen} filterMonth={filterMonth} filterYear={filterYear} setFilterMonth={setFilterMonth} setFilterYear={setFilterYear}/>}
      {screen==="expenses"&&<ExpensesScreen expenses={expenses} setExpenses={setExpenses} filterMonth={filterMonth} filterYear={filterYear} setFilterMonth={setFilterMonth} setFilterYear={setFilterYear}/>}
      {screen==="bills"&&<BillsScreen bills={bills} setBills={setBills}/>}
      {screen==="investments"&&<InvestmentsScreen investments={investments} setInvestments={setInvestments}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:520,background:"rgba(0,0,0,.97)",borderTop:"1px solid #111",display:"grid",gridTemplateColumns:"repeat(4,1fr)",padding:"0.5rem 0 calc(0.5rem + env(safe-area-inset-bottom))",zIndex:50}}>
      {[["home","home","Inicio"],["expenses","wallet","Gastos"],["bills","calendar","Cuotas"],["investments","trend","Inversiones"]].map(([id,icon,label])=>{
        const active=screen===id,color=navColors[id];
        return <button key={id} onClick={()=>setScreen(id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"0.3rem 0.5rem",border:"none",background:"transparent",cursor:"pointer",fontFamily:"inherit"}}>
          <div style={{width:36,height:32,borderRadius:9,background:active?`${color}15`:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:active?color:"#2a2a2a"}}><Ic n={icon} s={17}/></div>
          <span style={{fontSize:"0.58rem",fontWeight:active?700:500,color:active?color:"#2a2a2a"}}>{label}</span>
        </button>;
      })}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
